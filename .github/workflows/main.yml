name: Focus Arena Enterprise CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test-backend:
    name: Build & Test Backend (.NET 8)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore FocusArena.API/FocusArena.API.csproj
      
    - name: Build
      run: dotnet build FocusArena.API/FocusArena.API.csproj -c Release --no-restore
      
    # Disabling the generic test command until xUnit tests are safely configured
    # - name: Test
    #   run: dotnet test --no-build --verbosity normal

  build-and-test-frontend:
    name: Build & Test Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint Code
      run: npm run lint
      
    - name: Build Production
      run: npm run build

  e2e-playwright:
    name: E2E Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-test-frontend
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run Playwright Tests
      run: npx playwright test
