name: Mobile Android Release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile to run
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      create_release:
        description: Create a GitHub release for preview APK builds
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Expo token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN GitHub secret."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Trigger EAS Android build
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --wait

      - name: Export latest build metadata
        run: eas build:list --platform android --limit 1 --status finished --json --non-interactive > build.json

      - name: Extract build fields
        id: build_meta
        run: |
          node -e "const fs=require('fs'); const builds=JSON.parse(fs.readFileSync('build.json','utf8')); if(!Array.isArray(builds)||builds.length===0){process.exit(1)} const build=builds[0]; const artifactUrl=build?.artifacts?.buildUrl || ''; const buildPage=build?.buildDetailsPageUrl || ''; const buildId=build?.id || ''; fs.appendFileSync(process.env.GITHUB_OUTPUT, `artifact_url=${artifactUrl}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_page=${buildPage}\n`); fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_id=${buildId}\n`);"

      - name: Download Android artifact
        if: steps.build_meta.outputs.artifact_url != ''
        run: curl -L "${{ steps.build_meta.outputs.artifact_url }}" -o "focusarena-android-${{ inputs.profile }}.${{ inputs.profile == 'preview' && 'apk' || 'aab' }}"

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: focusarena-android-${{ inputs.profile }}-metadata
          path: mobile/build.json

      - name: Upload Android binary
        if: steps.build_meta.outputs.artifact_url != ''
        uses: actions/upload-artifact@v4
        with:
          name: focusarena-android-${{ inputs.profile }}
          path: mobile/focusarena-android-${{ inputs.profile }}.${{ inputs.profile == 'preview' && 'apk' || 'aab' }}

      - name: Create GitHub release for preview APK
        if: inputs.profile == 'preview' && inputs.create_release && steps.build_meta.outputs.artifact_url != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-preview-${{ github.run_number }}
          name: FocusArena Mobile Preview ${{ github.run_number }}
          body: |
            Android preview build generated by GitHub Actions.

            EAS build id: `${{ steps.build_meta.outputs.build_id }}`
            EAS build page: ${{ steps.build_meta.outputs.build_page }}
          files: mobile/focusarena-android-preview.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
